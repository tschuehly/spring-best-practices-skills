name: Kotest
description: >-
  Write a new Spring Boot test, or modernize an existing Kotlin test, using
  Kotest matchers and idiomatic Kotlin test style — constructor injection,
  backticked test names, apply/assertSoftly blocks, and existing object
  mothers and helpers. Picks the narrowest Spring test type for the behavior
  under test, preserves assertion semantics when modernizing, and verifies
  with a focused test command. Ships with shared references on Kotest
  matchers, idiomatic Kotlin test patterns, and Spring test types.
