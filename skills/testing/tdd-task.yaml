name: TDD Task
description: >-
  Implement a feature or fix a bug using strict TDD — plan a todolist, clarify
  ambiguities before coding, write a failing test first, then implement the
  minimum to pass, refactor, verify (with an E2E test for user-observable
  changes), and commit. Enforces red-green-refactor with mandatory gates.
